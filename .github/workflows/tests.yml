name: UI Tests

on:
  push:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    defaults:
      run:
        working-directory: selenium-ui-automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with Allure
        run: |
          pytest --alluredir=allure-results

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: selenium-ui-automation/allure-results

  name: UI Tests

on:
  push:
    branches: [ "main" ]

jobs:
  # הג'וב הקיים שלך – נשאר כמו שהוא
  tests:
    runs-on: ubuntu-latest
    
    env:
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    defaults:
      run:
        working-directory: selenium-ui-automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with Allure
        run: |
          pytest --alluredir=allure-results

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: selenium-ui-automation/allure-results

  docker-tests:
    runs-on: ubuntu-latest

    env:
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Selenium Docker image
        run: |
          docker build -t selenium-tests ./selenium-ui-automation

      - name: Run tests inside Docker
        run: |
          mkdir -p selenium-ui-automation/allure-results
          docker run --rm \
            -e USER_PASSWORD="${{ secrets.USER_PASSWORD }}" \
            -v "${{ github.workspace }}/selenium-ui-automation/allure-results:/app/allure-results" \
            selenium-tests

      - name: Upload Allure results from Docker run
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-docker
          path: selenium-ui-automation/allure-results
        
